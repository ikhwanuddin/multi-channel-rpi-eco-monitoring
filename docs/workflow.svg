<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 0 720 640" width="100%" height="100%" style="background-color: #ffffff;">
  <!-- Definitions for Grids and Arrowheads -->
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#e2e8f0" />
    </pattern>

    <!-- Standard Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#64748b" />
    </marker>
    <!-- Emerald Arrowhead for Recording -->
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#059669" />
    </marker>
    <!-- Blue Arrowhead for Cloud Upload -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#2563eb" />
    </marker>
  </defs>

  <!-- Render Background Grid -->
  <rect x="0" y="0" width="800" height="640" fill="url(#dotGrid)" />

  <!-- ==================== DIAGRAM TITLE ==================== -->
  <text x="400" y="20" fill="#0f172a" font-size="16" font-weight="700" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Multi-Channel RPi Eco-Monitoring Workflow</text>
  <text x="400" y="38" fill="#64748b" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">System initialization → Recording → Cloud synchronization → State management</text>

  <!-- ==================== BOUNDARIES & DOMAINS ==================== -->

  <!-- 01 / System & Initialization Domain -->
  <g>
    <rect x="80" y="60" width="200" height="210" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="92" y="78" fill="#64748b" font-size="11" font-weight="700" font-family="system-ui, -apple-system, sans-serif">01 / SYSTEM INIT</text>
  </g>

  <!-- 02 / Ecoacoustic Recording Domain -->
  <g>
    <rect x="300" y="150" width="200" height="320" rx="12" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="312" y="168" fill="#059669" font-size="11" font-weight="700" font-family="system-ui, -apple-system, sans-serif">02 / ECOACOUSTIC RECORDING</text>
  </g>

  <!-- 03 / Cloud Sync & State Domain -->
  <g>
    <rect x="520" y="250" width="200" height="320" rx="12" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="532" y="268" fill="#2563eb" font-size="11" font-weight="700" font-family="system-ui, -apple-system, sans-serif">03 / CLOUD SYNC &amp; STATE</text>
  </g>

  <!-- ==================== CONNECTION PATHS (LINES) ==================== -->

  <!-- Boot to Config -->
  <path d="M 180 152 L 180 188" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Config to Sensor -->
  <path d="M 250 220 L 330 220" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <!-- Sensor to Record -->
  <path d="M 400 252 L 400 288" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-emerald)" />

  <!-- Record to Storage -->
  <path d="M 400 352 L 400 388" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-emerald)" />

  <!-- Offline Loop (Storage -> Record) -->
  <path d="M 330 420 C 260 420, 260 320, 330 320" stroke="#059669" stroke-width="2" stroke-dasharray="6 3" fill="none" marker-end="url(#arrow-emerald)" />

  <!-- Online Flow (Storage -> Verify) -->
  <path d="M 470 420 Q 540 420, 540 320 L 550 320" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />

  <!-- Verify to Upload -->
  <path d="M 620 352 L 620 388" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />

  <!-- Upload to State / Decision -->
  <path d="M 620 452 L 620 488" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />

  <!-- Next Cycle Loop (Decision -> Record / Storage) -->
  <path d="M 620 552 V 585 H 400 V 320" stroke="#059669" stroke-width="1.8" stroke-dasharray="6 3" fill="none" marker-end="url(#arrow-emerald)" />


  <!-- ==================== EDGE LABELS ==================== -->

  <!-- Init Hardware Label -->
  <g transform="translate(290, 220)">
    <rect x="-42" y="-10" width="84" height="20" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
    <text x="0" y="4" fill="#475569" font-size="10" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Init Hardware</text>
  </g>

  <!-- Offline Loop Label -->
  <g transform="translate(270, 370)">
    <rect x="-42" y="-10" width="84" height="20" rx="4" fill="#ffffff" stroke="#a7f3d0" stroke-width="1" />
    <text x="0" y="4" fill="#047857" font-size="10" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Offline Loop</text>
  </g>

  <!-- Online Mode Label -->
  <g transform="translate(510, 370)">
    <rect x="-38" y="-10" width="76" height="20" rx="4" fill="#ffffff" stroke="#bae6fd" stroke-width="1" />
    <text x="0" y="4" fill="#1d4ed8" font-size="10" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Online Mode</text>
  </g>

  <!-- Next Cycle Label -->
  <g transform="translate(510, 585)">
    <rect x="-38" y="-10" width="76" height="20" rx="4" fill="#ffffff" stroke="#a7f3d0" stroke-width="1" />
    <text x="0" y="4" fill="#047857" font-size="10" font-weight="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Next Cycle</text>
  </g>


  <!-- ==================== PROCESS NODES ==================== -->

  <!-- Node: System Boot -->
  <g>
    <rect x="110" y="88" width="140" height="64" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" />
    <svg x="120" y="108" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#0f172a">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1 0 12.728 0M12 3v9"/>
    </svg>
    <text x="152" y="116" fill="#0f172a" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">System Boot</text>
    <text x="152" y="132" fill="#475569" font-size="10" font-family="system-ui, -apple-system, sans-serif">Power On Init</text>
    <!-- Step Badge -->
    <circle cx="246" cy="92" r="12" fill="#64748b" />
    <text x="246" y="93" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">01</text>
  </g>

  <!-- Node: Load Config -->
  <g>
    <rect x="110" y="188" width="140" height="64" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2" />
    <svg x="120" y="208" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#78350f">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
    </svg>
    <text x="152" y="216" fill="#78350f" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Load Config</text>
    <text x="152" y="232" fill="#b45309" font-size="10" font-family="system-ui, -apple-system, sans-serif">config.json</text>
    <!-- Step Badge -->
    <circle cx="246" cy="192" r="12" fill="#d97706" />
    <text x="246" y="193" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">02</text>
  </g>

  <!-- Node: Init Sensor -->
  <g>
    <rect x="330" y="188" width="140" height="64" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2" />
    <svg x="340" y="208" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#164e63">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/>
    </svg>
    <text x="372" y="216" fill="#164e63" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Init Sensor</text>
    <text x="372" y="232" fill="#0e7490" font-size="10" font-family="system-ui, -apple-system, sans-serif">Circular Mic Array</text>
    <!-- Step Badge -->
    <circle cx="466" cy="192" r="12" fill="#0891b2" />
    <text x="466" y="193" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">03</text>
  </g>

  <!-- Node: Record Loop (Emerald Primary) -->
  <g>
    <rect x="330" y="288" width="140" height="64" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2.5" />
    <svg x="340" y="308" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#064e3b">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
    </svg>
    <text x="372" y="316" fill="#064e3b" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Record Loop</text>
    <text x="372" y="332" fill="#047857" font-size="10" font-family="system-ui, -apple-system, sans-serif">python_record.py</text>
    <!-- Step Badge -->
    <circle cx="466" cy="292" r="12" fill="#059669" />
    <text x="466" y="293" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">04</text>
  </g>

  <!-- Node: Save to Local Storage -->
  <g>
    <rect x="330" y="388" width="140" height="64" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2" />
    <svg x="340" y="408" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#064e3b">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125"/>
    </svg>
    <text x="372" y="416" fill="#064e3b" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Local Save</text>
    <text x="372" y="432" fill="#047857" font-size="10" font-family="system-ui, -apple-system, sans-serif">~/monitoring_data</text>
    <!-- Step Badge -->
    <circle cx="466" cy="392" r="12" fill="#059669" />
    <text x="466" y="393" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">05</text>
  </g>



  <!-- Node: Verify File -->
  <g>
    <rect x="550" y="288" width="140" height="64" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <svg x="560" y="308" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#1e3a8a">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
    </svg>
    <text x="592" y="316" fill="#1e3a8a" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Verify File</text>
    <text x="592" y="332" fill="#1d4ed8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Integrity Check</text>
    <!-- Step Badge -->
    <circle cx="686" cy="292" r="12" fill="#2563eb" />
    <text x="686" y="293" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">06</text>
  </g>

  <!-- Node: Rclone Upload -->
  <g>
    <rect x="550" y="388" width="140" height="64" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
    <svg x="560" y="408" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#1e3a8a">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z"/>
    </svg>
    <text x="592" y="416" fill="#1e3a8a" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Rclone Sync</text>
    <text x="592" y="432" fill="#1d4ed8" font-size="10" font-family="system-ui, -apple-system, sans-serif">Cloud Upload</text>
    <!-- Step Badge -->
    <circle cx="686" cy="392" r="12" fill="#2563eb" />
    <text x="686" y="393" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">07</text>
  </g>

  <!-- Node: Post-Upload State -->
  <g>
    <rect x="550" y="488" width="140" height="64" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2" />
    <svg x="560" y="508" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#831843">
      <path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0 1 18 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3 1.5 1.5 3-3.75"/>
    </svg>
    <text x="592" y="516" fill="#831843" font-size="13" font-weight="700" font-family="system-ui, -apple-system, sans-serif">Update State</text>
    <text x="592" y="532" fill="#be185d" font-size="10" font-family="system-ui, -apple-system, sans-serif">.rclone_state.json</text>
    <!-- Step Badge -->
    <circle cx="686" cy="492" r="12" fill="#db2777" />
    <text x="686" y="493" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">08</text>
  </g>


  <!-- ==================== SOCIAL MEDIA - TWITTER/X ==================== -->
  <g>
    <!-- Background Card (Horizontal Layout) -->
    <rect x="570" y="60" width="150" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <!-- X-Twitter Icon -->
    <svg x="582" y="71" width="14" height="14" viewBox="0 0 448 512">
      <path fill="#0f172a" d="M357.2 48L427.8 48 273.6 224.2 455 464L313 464 201.7 318.6 74.5 464 3.8 464 168.7 275.5-5.2 48 140.4 48 240.9 180.9 357.2 48zM332.4 421.8l39.1 0-252.4-333.8-42 0 255.3 333.8z"/>
    </svg>
    <!-- Handle Text -->
    <text x="608" y="82" fill="#0f172a" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">@ikhwanuddin</text>
    <!-- Verified Checkmark -->
    <svg x="697" y="72" width="12" height="12" viewBox="0 0 512 512">
      <path fill="#1d4ed8" d="M256 512a256 256 0 1 1 0-512 256 256 0 1 1 0 512zM374 145.7c-10.7-7.8-25.7-5.4-33.5 5.3L221.1 315.2 169 263.1c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l72 72c5 5 11.8 7.5 18.8 7s13.4-4.1 17.5-9.8L379.3 179.2c7.8-10.7 5.4-25.7-5.3-33.5z"/>
    </svg>
  </g>

  <!-- ==================== RELEVANT LEGEND PANEL ==================== -->
  <g transform="translate(0, 500)">
    <!-- Background Panel -->
    <rect x="80" y="0" width="180" height="115" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />

    <!-- Legend Header -->
    <text x="92" y="16" fill="#64748b" font-size="10" font-weight="700" font-family="system-ui, -apple-system, sans-serif">LEGEND</text>

    <!-- Legend: System/Config -->
    <rect x="96" y="26" width="14" height="10" rx="2" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" />
    <text x="120" y="35" fill="#475569" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">System Boot</text>

    <!-- Legend: Audio Sensor -->
    <rect x="96" y="46" width="14" height="10" rx="2" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5" />
    <text x="120" y="55" fill="#0e7490" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Hardware / Sensor</text>

    <!-- Legend: Recording -->
    <rect x="96" y="66" width="14" height="10" rx="2" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" />
    <text x="120" y="75" fill="#047857" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Ecoacoustic Recording</text>

    <!-- Legend: Cloud Sync -->
    <rect x="96" y="86" width="14" height="10" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
    <text x="120" y="95" fill="#1d4ed8" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Cloud Sync &amp; State</text>
  </g>
</svg>
